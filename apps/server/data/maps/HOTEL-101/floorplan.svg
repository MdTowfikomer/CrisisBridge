<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <!-- Wall pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <!-- Glow filter for exits -->
    <filter id="exitGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Hazard stripes -->
    <pattern id="hazardStripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#fbbf24" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FLOOR 3 - CAD ARCHITECTURAL LAYOUT         -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Main outer walls -->
  <rect x="40" y="40" width="720" height="420" rx="2" fill="none" stroke="#334155" stroke-width="3"/>

  <!-- Central Corridor (horizontal) -->
  <rect x="40" y="200" width="720" height="100" fill="#1e293b" opacity="0.3"/>
  <line x1="40" y1="200" x2="760" y2="200" stroke="#475569" stroke-width="2"/>
  <line x1="40" y1="300" x2="760" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="400" y="255" fill="#475569" font-size="11" text-anchor="middle" font-family="monospace" letter-spacing="4" font-weight="600">MAIN CORRIDOR — FLOOR 3</text>

  <!-- ═══ LEFT WING ═══ -->

  <!-- Lobby Area (bottom-left) -->
  <rect x="40" y="300" width="180" height="160" fill="#1e293b" opacity="0.15"/>
  <rect x="40" y="300" width="180" height="160" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Lobby furniture (desk) -->
  <rect x="80" y="370" width="100" height="30" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="130" y="390" fill="#475569" font-size="8" text-anchor="middle" font-family="monospace">FRONT DESK</text>
  <!-- Lobby label -->
  <text x="130" y="325" fill="#64748b" font-size="12" text-anchor="middle" font-family="monospace" font-weight="700">LOBBY</text>
  <!-- Lobby QR checkpoint marker -->
  <rect x="115" y="335" width="30" height="20" rx="3" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="349" fill="#3b82f6" font-size="7" text-anchor="middle" font-family="monospace">QR</text>

  <!-- Room 306 (top-left) -->
  <rect x="40" y="40" width="180" height="160" fill="#1e293b" opacity="0.15"/>
  <rect x="40" y="40" width="180" height="160" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Room 306 furniture (bed) -->
  <rect x="65" y="75" width="70" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="100" y="125" fill="#334155" font-size="7" text-anchor="middle" font-family="monospace">BED</text>
  <!-- Room 306 bathroom -->
  <rect x="155" y="55" width="50" height="50" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="180" y="84" fill="#334155" font-size="6" text-anchor="middle" font-family="monospace">BATH</text>
  <!-- Door indicator -->
  <rect x="110" y="194" width="30" height="6" rx="1" fill="#334155"/>
  <text x="130" y="60" fill="#64748b" font-size="12" text-anchor="middle" font-family="monospace" font-weight="700">ROOM 306</text>

  <!-- ═══ CENTER ═══ -->

  <!-- Room 305 (top-center) -->
  <rect x="240" y="40" width="180" height="160" fill="#1e293b" opacity="0.15"/>
  <rect x="240" y="40" width="180" height="160" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Room 305 furniture -->
  <rect x="265" y="75" width="70" height="90" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="125" fill="#334155" font-size="7" text-anchor="middle" font-family="monospace">BED</text>
  <!-- Room 305 bathroom -->
  <rect x="355" y="55" width="50" height="50" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="380" y="84" fill="#334155" font-size="6" text-anchor="middle" font-family="monospace">BATH</text>
  <!-- Door indicator -->
  <rect x="310" y="194" width="30" height="6" rx="1" fill="#334155"/>
  <text x="330" y="60" fill="#64748b" font-size="12" text-anchor="middle" font-family="monospace" font-weight="700">ROOM 305</text>

  <!-- Stairwell (center-bottom) -->
  <rect x="240" y="300" width="180" height="160" fill="#1e293b" opacity="0.25"/>
  <rect x="240" y="300" width="180" height="160" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Stair treads -->
  <line x1="270" y1="330" x2="390" y2="330" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="345" x2="390" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="360" x2="390" y2="360" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="375" x2="390" y2="375" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="390" x2="390" y2="390" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="405" x2="390" y2="405" stroke="#334155" stroke-width="1"/>
  <line x1="270" y1="420" x2="390" y2="420" stroke="#334155" stroke-width="1"/>
  <!-- Stair arrow -->
  <polygon points="330,435 320,445 340,445" fill="#475569"/>
  <text x="330" y="325" fill="#64748b" font-size="12" text-anchor="middle" font-family="monospace" font-weight="700">STAIRS</text>
  <text x="330" y="453" fill="#475569" font-size="7" text-anchor="middle" font-family="monospace">↓ TO GROUND</text>

  <!-- ═══ RIGHT WING ═══ -->

  <!-- Hallway B area (top-right) -->
  <rect x="440" y="40" width="180" height="160" fill="#1e293b" opacity="0.1"/>
  <rect x="440" y="40" width="180" height="160" fill="none" stroke="#334155" stroke-width="2"/>
  <text x="530" y="125" fill="#475569" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">CONFERENCE</text>
  <text x="530" y="140" fill="#475569" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">ROOM A</text>
  <!-- Conference table -->
  <ellipse cx="530" cy="100" rx="50" ry="20" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- ═══ EXITS ═══ -->

  <!-- Exit 1 (bottom-center, via stairs) -->
  <rect x="290" y="455" width="80" height="5" rx="2" fill="#10b981" filter="url(#exitGlow)"/>
  <text x="330" y="470" fill="#10b981" font-size="9" text-anchor="middle" font-family="monospace" font-weight="700" letter-spacing="2">EXIT 1</text>

  <!-- Exit 2 (right side) -->
  <rect x="755" y="220" width="5" height="60" rx="2" fill="#10b981" filter="url(#exitGlow)"/>
  <text x="740" y="255" fill="#10b981" font-size="9" text-anchor="end" font-family="monospace" font-weight="700" letter-spacing="2">EXIT 2</text>

  <!-- Hallway B connector (right corridor extension) -->
  <rect x="620" y="200" width="140" height="100" fill="#1e293b" opacity="0.2"/>
  <rect x="620" y="200" width="140" height="100" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="690" y="255" fill="#475569" font-size="10" text-anchor="middle" font-family="monospace" font-weight="600">HALLWAY B</text>

  <!-- Hallway A label -->
  <text x="200" y="255" fill="#475569" font-size="10" text-anchor="middle" font-family="monospace" font-weight="600">HALLWAY A</text>

  <!-- ═══ DIMENSIONING LINES (CAD style) ═══ -->

  <!-- Top dimension -->
  <line x1="40" y1="25" x2="760" y2="25" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="20" x2="40" y2="30" stroke="#334155" stroke-width="0.5"/>
  <line x1="760" y1="20" x2="760" y2="30" stroke="#334155" stroke-width="0.5"/>
  <text x="400" y="22" fill="#334155" font-size="8" text-anchor="middle" font-family="monospace">72.0 m</text>

  <!-- Left dimension -->
  <line x1="25" y1="40" x2="25" y2="460" stroke="#334155" stroke-width="0.5"/>
  <line x1="20" y1="40" x2="30" y2="40" stroke="#334155" stroke-width="0.5"/>
  <line x1="20" y1="460" x2="30" y2="460" stroke="#334155" stroke-width="0.5"/>
  <text x="18" y="250" fill="#334155" font-size="8" text-anchor="middle" font-family="monospace" transform="rotate(-90, 18, 250)">42.0 m</text>

  <!-- Title block (bottom-right, CAD convention) -->
  <rect x="580" y="360" width="180" height="100" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <line x1="580" y1="380" x2="760" y2="380" stroke="#334155" stroke-width="0.5"/>
  <line x1="580" y1="400" x2="760" y2="400" stroke="#334155" stroke-width="0.5"/>
  <line x1="580" y1="420" x2="760" y2="420" stroke="#334155" stroke-width="0.5"/>
  <line x1="580" y1="440" x2="760" y2="440" stroke="#334155" stroke-width="0.5"/>
  <text x="670" y="374" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="monospace" font-weight="700">GRAND HOTEL</text>
  <text x="670" y="394" fill="#64748b" font-size="7" text-anchor="middle" font-family="monospace">FLOOR 3 — GUEST WING</text>
  <text x="670" y="414" fill="#64748b" font-size="7" text-anchor="middle" font-family="monospace">SCALE 1:200</text>
  <text x="670" y="434" fill="#64748b" font-size="7" text-anchor="middle" font-family="monospace">DWG NO. CB-FP-301</text>
  <text x="670" y="454" fill="#475569" font-size="7" text-anchor="middle" font-family="monospace">CRISISBRIDGE CAD v1.0</text>

  <!-- North arrow -->
  <g transform="translate(710, 55)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#334155" stroke-width="1"/>
    <polygon points="0,-14 -5,4 0,-2 5,4" fill="#475569"/>
    <text x="0" y="-20" fill="#64748b" font-size="8" text-anchor="middle" font-family="monospace" font-weight="700">N</text>
  </g>

  <!-- ═══ FIRE EQUIPMENT ═══ -->
  <!-- Fire extinguisher symbols -->
  <circle cx="235" cy="250" r="5" fill="none" stroke="#ef4444" stroke-width="1"/>
  <text x="235" y="253" fill="#ef4444" font-size="6" text-anchor="middle" font-family="monospace" font-weight="700">FE</text>

  <circle cx="445" cy="250" r="5" fill="none" stroke="#ef4444" stroke-width="1"/>
  <text x="445" y="253" fill="#ef4444" font-size="6" text-anchor="middle" font-family="monospace" font-weight="700">FE</text>

  <!-- Emergency exit signs -->
  <rect x="305" y="290" width="50" height="10" rx="2" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
  <text x="330" y="298" fill="#10b981" font-size="6" text-anchor="middle" font-family="monospace" font-weight="700">EXIT →</text>

  <rect x="710" y="195" width="45" height="10" rx="2" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
  <text x="733" y="203" fill="#10b981" font-size="6" text-anchor="middle" font-family="monospace" font-weight="700">EXIT →</text>
</svg>
