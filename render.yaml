services:
  - type: web
    name: crisisbridge-server
    env: node
    plan: free
    rootDir: apps/server
    buildCommand: cd ../.. && pnpm install && pnpm build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - fromGroup: crisisbridge-secrets
