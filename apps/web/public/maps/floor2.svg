<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1000" height="800" fill="url(#bgGradient)" />

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="1000" height="800" fill="url(#grid)" />

  <!-- U-Shaped Walls -->
  <rect x="100" y="200" width="150" height="500" fill="#1e1e1e" stroke="#333333" stroke-width="4" />
  <rect x="250" y="200" width="500" height="150" fill="#1e1e1e" stroke="#333333" stroke-width="4" />
  <rect x="750" y="200" width="150" height="500" fill="#1e1e1e" stroke="#333333" stroke-width="4" />

  <!-- Corridors -->
  <rect x="150" y="250" width="50" height="400" fill="#2a2a2a" />
  <rect x="200" y="250" width="600" height="50" fill="#2a2a2a" />
  <rect x="800" y="250" width="50" height="400" fill="#2a2a2a" />

  <!-- Identical Elevator -->
  <rect id="elevator" x="450" y="200" width="100" height="50" fill="#112233" stroke="#4dabf7" stroke-width="2" filter="url(#glow)"/>
  <text x="500" y="230" fill="#4dabf7" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">ELEV</text>

  <!-- Identical Stairwells -->
  <rect id="stair_left" x="150" y="650" width="50" height="50" fill="#332211" stroke="#f03e3e" stroke-width="2" />
  <line x1="150" y1="650" x2="200" y2="700" stroke="#f03e3e" stroke-width="2" />
  <line x1="200" y1="650" x2="150" y2="700" stroke="#f03e3e" stroke-width="2" />
  <text x="175" y="635" fill="#f03e3e" font-family="monospace" font-size="14" text-anchor="middle">STAIR 1</text>

  <rect id="stair_right" x="800" y="650" width="50" height="50" fill="#332211" stroke="#f03e3e" stroke-width="2" />
  <line x1="800" y1="650" x2="850" y2="700" stroke="#f03e3e" stroke-width="2" />
  <line x1="850" y1="650" x2="800" y2="700" stroke="#f03e3e" stroke-width="2" />
  <text x="825" y="635" fill="#f03e3e" font-family="monospace" font-size="14" text-anchor="middle">STAIR 2</text>

  <!-- Floor Label -->
  <text x="50" y="50" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold" opacity="0.8">FLOOR 2</text>
</svg>
